name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            ext: ""
          - os: macos-latest
            target: macos-arm64
            ext: ""
          - os: windows-latest
            target: windows-x86_64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Build binary
        run: >
          uv run nuitka --onefile --assume-yes-for-downloads
          --output-dir=dist --remove-output
          --output-filename=rezerv ./src/main.py

      - name: Rename artifact
        shell: bash
        run: mv "dist/rezerv${{ matrix.ext }}" "dist/rezerv-${{ matrix.target }}${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rezerv-${{ matrix.target }}
          path: dist/rezerv-${{ matrix.target }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
